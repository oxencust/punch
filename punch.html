<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e8f5ee">
<title>衡點健康  出勤打卡</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:          #5a9a7a;
    --primary-light:    #8ec5a7;
    --primary-bg:       #e8f5ee;
    --clock-in:         #8ec5a7;
    --clock-in-hover:   #7ab896;
    --clock-out:        #e8b4a8;
    --clock-out-hover:  #dba396;
    --extra:            #d4b896;
    --extra-hover:      #c7a886;
    --background:       linear-gradient(180deg, #e8f5ee 0%, #d4ebe0 100%);
    --card:             #ffffff;
    --text:             #2d3748;
    --text-muted:       #718096;
    --text-light:       #a0aec0;
    --border:           #e2e8f0;
    --shadow:           0 2px 8px rgba(0, 0, 0, 0.06);
    --shadow-lg:        0 4px 16px rgba(0, 0, 0, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--background);
    min-height: 100vh;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }

  /* ========== Loading ========== */
  .loading-screen {
    position: fixed; inset: 0;
    background: var(--background);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  .loading-icon {
    width: 72px; height: 72px;
    background: white;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-lg);
    animation: pulse 2s infinite;
    padding: 10px;
  }
  .loading-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .loading-text {
    margin-top: 16px;
    color: var(--text-muted);
    font-size: 14px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.05); opacity: 0.8; }
  }

  /* ========== Error ========== */
  .error-screen {
    position: fixed; inset: 0;
    background: var(--background);
    display: none; align-items: center; justify-content: center;
    padding: 16px; z-index: 1000;
  }
  .error-screen.show { display: flex; }
  .error-card {
    background: white;
    border-radius: 20px;
    padding: 32px;
    max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .error-icon {
    width: 64px; height: 64px;
    background: #fef2f2;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .error-icon svg { width: 32px; height: 32px; color: #ef4444; }
  .error-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 8px;
  }
  .error-message {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.7;
  }
  .error-tips {
    background: #f8fafc;
    border-radius: 12px;
    padding: 12px;
    text-align: left;
  }
  .error-tips-title {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .error-tips ul {
    font-size: 12px;
    color: var(--text-muted);
    padding-left: 16px;
    line-height: 1.7;
  }

  /* ========== App ========== */
  .app { display: none; min-height: 100vh; }
  .app.show { display: block; }

  /* ---- Header ---- */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .header-content {
    max-width: 480px; margin: 0 auto;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 40px; height: 40px;
    background: white;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    padding: 5px;
  }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .header-title { font-weight: 600; font-size: 16px; color: var(--text); }
  .header-subtitle { font-size: 12px; color: var(--text-muted); }

  /* ---- Main ---- */
  .main {
    max-width: 480px; margin: 0 auto;
    padding: 32px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }

  /* User */
  .user-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .user-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-avatar svg { width: 40px; height: 40px; color: white; }
  .user-avatar::after {
    content: '';
    position: absolute; bottom: 4px; right: 4px;
    width: 16px; height: 16px;
    background: #48bb78;
    border: 3px solid #e8f5ee;
    border-radius: 50%;
  }
  .user-name { font-size: 24px; font-weight: 600; color: var(--text); }
  .user-id {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px;
    background: rgba(0, 0, 0, 0.05);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Date */
  .date-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: white;
    border-radius: 30px;
    box-shadow: var(--shadow);
    font-size: 14px;
    color: var(--text);
  }
  .date-badge svg { width: 18px; height: 18px; color: var(--text-muted); }

  /* Time */
  .time-display {
    display: flex; align-items: center; justify-content: center;
  }
  .time-digit {
    font-size: 72px; font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .time-separator {
    font-size: 72px; font-weight: 300;
    color: var(--text-light);
    line-height: 1;
    margin: 0 4px;
  }

  /* Status pill */
  .status-card {
    width: 100%;
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 12px;
  }
  .status-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #dcfce7;
    flex-shrink: 0;
  }
  .status-icon svg { width: 20px; height: 20px; color: #22c55e; }
  .status-icon.warn { background: #fef3c7; }
  .status-icon.warn svg { color: #f59e0b; }
  .status-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .status-detail { font-size: 12px; color: var(--text-muted); }

  /* Clock buttons */
  .clock-buttons {
    display: flex; justify-content: center;
    gap: 20px;
    padding: 8px 0;
    flex-wrap: wrap;
  }
  .clock-btn-wrapper {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    position: relative;
  }
  .clock-btn {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .clock-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .clock-btn:not(:disabled):hover { transform: scale(1.05); }
  .clock-btn:not(:disabled):active { transform: scale(0.95); }
  .clock-btn.clock-in    { background: var(--clock-in); }
  .clock-btn.clock-in:not(:disabled):hover    { background: var(--clock-in-hover); }
  .clock-btn.clock-out   { background: var(--clock-out); }
  .clock-btn.clock-out:not(:disabled):hover   { background: var(--clock-out-hover); }
  .clock-btn.clock-extra { background: var(--extra); }
  .clock-btn.clock-extra:not(:disabled):hover { background: var(--extra-hover); }
  .clock-btn svg { width: 36px; height: 36px; color: white; }
  .clock-btn-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .clock-btn-label.clock-in    { color: var(--primary); }
  .clock-btn-label.clock-out   { color: #c97a6d; }
  .clock-btn-label.clock-extra { color: #a68558; }

  /* Suggestion ring */
  .clock-btn-wrapper.suggested .clock-btn::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    opacity: 0.55;
    animation: ringPulse 1.8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0%, 100% { transform: scale(1);    opacity: 0.55; }
    50%      { transform: scale(1.12); opacity: 0; }
  }
  .suggest-badge {
    position: absolute;
    top: -8px; right: -4px;
    background: var(--primary);
    color: white;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    pointer-events: none;
    display: none;
  }
  .clock-btn-wrapper.suggested .suggest-badge { display: inline-block; }

  /* Button spinner */
  .clock-btn .btn-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    display: none;
  }
  .clock-btn.loading svg { display: none; }
  .clock-btn.loading .btn-spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Note */
  .note-field { width: 100%; }
  .note-label {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 6px; padding-left: 4px;
  }
  .note-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    resize: none;
    min-height: 44px;
    transition: border-color 0.2s;
  }
  .note-input:focus { outline: none; border-color: var(--primary); }

  /* Attendance card */
  .attendance-card {
    width: 100%;
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .attendance-title {
    font-size: 16px; font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .attendance-title svg { width: 20px; height: 20px; color: var(--text-muted); }
  .attendance-count {
    margin-left: auto;
    font-size: 12px; color: var(--text-muted);
    background: #f1f5f9;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .attendance-items { display: flex; flex-direction: column; gap: 12px; }
  .attendance-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: #f8fafc;
    border-radius: 12px;
  }
  .attendance-item-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .attendance-item-icon.in    { background: rgba(142, 197, 167, 0.2); }
  .attendance-item-icon.out   { background: rgba(232, 180, 168, 0.2); }
  .attendance-item-icon.extra { background: rgba(212, 184, 150, 0.2); }
  .attendance-item-icon svg { width: 18px; height: 18px; }
  .attendance-item-icon.in    svg { color: var(--primary); }
  .attendance-item-icon.out   svg { color: #c97a6d; }
  .attendance-item-icon.extra svg { color: #a68558; }
  .attendance-item-content { flex: 1; }
  .attendance-item-label { font-size: 12px; color: var(--text-muted); }
  .attendance-item-time {
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .attendance-empty {
    text-align: center; color: var(--text-light);
    font-size: 13px; padding: 18px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
    padding: 0 16px;
    max-width: 100%;
  }
  .toast {
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.3s ease;
    color: white;
    pointer-events: auto;
    max-width: 420px;
    text-align: center;
  }
  .toast.success { background: #22c55e; }
  .toast.error   { background: #ef4444; }
  .toast.warning { background: #f59e0b; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Fade stagger */
  .fade-in { animation: fadeIn 0.5s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .delay-1 { animation-delay: 0.08s; }
  .delay-2 { animation-delay: 0.16s; }
  .delay-3 { animation-delay: 0.24s; }
  .delay-4 { animation-delay: 0.32s; }
  .delay-5 { animation-delay: 0.40s; }

  @media (max-width: 360px) {
    .time-digit, .time-separator { font-size: 60px; }
    .clock-btn { width: 88px; height: 88px; }
    .clock-btn svg, .clock-btn .btn-spinner { width: 32px; height: 32px; }
  }
</style>
</head>

<!-- Loading -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-icon">
    <img src="https://ik.imagekit.io/hanhealth/assets/logo.png?updatedAt=1772155101138" alt="衡點健康">

        <li>網路連線正常</li>
      </ul>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="header-logo">
          <img src="https://ik.imagekit.io/hanhealth/assets/logo.png?updatedAt=1772155101138" alt="衡點健康">
        </div>
        <div>
          <h1 class="header-title">衡點 出勤</h1>
          <p class="header-subtitle" id="roleBadge">—</p>

  <main class="main">

    <section class="user-section fade-in">

      </div>
      <h2 class="user-name" id="userName">—</h2>

    <!-- Date -->
    <section class="fade-in delay-1">
      <div class="date-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />

    </section>

    <section class="status-card fade-in delay-3" id="statusCard">

        </svg>
      </div>
      <div>
        <p class="status-text" id="statusText">已驗證打卡 QR</p>
        <p class="status-detail" id="statusDetail">—</p>
      </div>
    </section>

    <!-- Clock buttons -->
    <section class="clock-buttons fade-in delay-4">

            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />
          </svg>
          <div class="btn-spinner"></div>
        </button>
        <span class="clock-btn-label clock-in">上班</span>
        <span class="suggest-badge">建議</span>
      </div>

      <div class="clock-btn-wrapper" id="wrap-out">

          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />

          <div class="btn-spinner"></div>

        <span class="clock-btn-label clock-out">下班</span>
        <span class="suggest-badge">建議</span>

      <div class="clock-btn-wrapper" id="wrap-extra">
        <button class="clock-btn clock-extra" id="btn-extra" data-type="extra" disabled>
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />

          <div class="btn-spinner"></div>
        </button>
        <span class="clock-btn-label clock-extra">加班</span>
        <span class="suggest-badge">建議</span>
      </div>

    </section>

    <!-- Note -->
    <section class="note-field fade-in delay-4">
      <div class="note-label">備註 (選填，最多 60 字)</div>

    <!-- Today record -->

      <h3 class="attendance-title">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />

        <div class="attendance-empty">尚未打卡</div>
      </div>
    </section>

  </main>

  <footer class="footer">衡點健康 Hendia  /  Punch Clock v1.0</footer>

</div>

<!-- Toast -->

<script>
  // ==================== 設定 ====================
  const LIFF_ID      = "2007947083-EsrS7ZrM";
  const SUPABASE_URL = "https://mnjilhpztnowaplggvkk.supabase.co";
  const API_URL      = SUPABASE_URL + "/functions/v1/attendance-api";

  // ==================== 全域狀態 ====================
  const state = {
    token:       null,
    lineUid:     null,
    actor:       null,   // { id, name, role }
    suggested:   null,
    countToday:  0,
    today:       "",
    timeHHMM:    "",
    submitting:  false,
    records:     [],     // 本次 session 成功打出的紀錄（optimistic）
  };

  const $ = (id) => document.getElementById(id);

  // ==================== 狀態切換 ====================
  function showLoading(text) {
    $("errorScreen").classList.remove("show");
    $("app").classList.remove("show");
    $("loadingScreen").style.display = "flex";
    if (text) $("loadingText").textContent = text;
  }
  function showApp() {
    $("loadingScreen").style.display = "none";
    $("errorScreen").classList.remove("show");
    $("app").classList.add("show");
  }
  function showError(title, message, tips) {
    $("loadingScreen").style.display = "none";
    $("app").classList.remove("show");
    $("errorTitle").textContent   = title || "發生錯誤";
    $("errorMessage").textContent = message || "";
    if (Array.isArray(tips) && tips.length) {
      $("errorTips").innerHTML = tips.map(t => `<li>${t}</li>`).join("");
    }
    $("errorScreen").classList.add("show");
  }

  // ==================== Toast ====================
  function toast(type, msg, ms) {
    const container = $("toastContainer");
    const el = document.createElement("div");
    el.className = "toast " + (type || "success");
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity 0.3s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 320);
    }, ms || 2600);
  }

  // ==================== 時鐘 ====================
  function pad2(n) { return String(n).padStart(2, "0"); }

  function taipeiNow() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Taipei",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hour12: false, weekday: "short",
    }).formatToParts(new Date());
    const o = {};
    parts.forEach(p => o[p.type] = p.value);
    return o;
  }
  function updateClock() {
    const p = taipeiNow();
    $("timeHour").textContent   = p.hour;
    $("timeMinute").textContent = p.minute;
    $("timeSecond").textContent = p.second;
    const wkMap = { Mon:"一", Tue:"二", Wed:"三", Thu:"四", Fri:"五", Sat:"六", Sun:"日" };
    $("dateDisplay").textContent =
      `${p.year}年${parseInt(p.month,10)}月${parseInt(p.day,10)}日 星期${wkMap[p.weekday] || p.weekday}`;
  }
  function taipeiHHMMSS() {
    const p = taipeiNow();
    return `${p.hour}:${p.minute}:${p.second}`;
  }

  // ==================== URL token ====================
  function getTokenFromUrl() {
    try {
      const params = new URLSearchParams(window.location.search);
      let t = params.get("t") || params.get("token");
      if (t) return t;
      const liffState = params.get("liff.state");
      if (liffState) {
        const inner = new URLSearchParams(liffState.startsWith("?") ? liffState.slice(1) : liffState);
        t = inner.get("t") || inner.get("token");
        if (t) return t;
      }
    } catch (_) {}
    return null;
  }

  // ==================== 顯示工具 ====================
  function roleText(role) {
    return role === "coach" ? "教練 Coach" : "員工 Staff";
  }
  function typeLabel(type) {
    return { in:"上班", out:"下班", extra:"加班" }[type] || type;
  }

  function markSuggested(type) {
    ["in", "out", "extra"].forEach(t => {
      $("wrap-" + t).classList.toggle("suggested", t === type);
    });
  }

  function setButtonsEnabled(enabled) {
    ["in", "out", "extra"].forEach(t => {
      $("btn-" + t).disabled = !enabled;
    });
  }

  function renderRecords() {
    const items = $("recordItems");
    $("countBadge").textContent = state.records.length + " 次";

    if (state.records.length === 0) {
      items.innerHTML = '<div class="attendance-empty">尚未打卡</div>';
      return;
    }

    const iconPath = {
      in:    `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />`,
      out:   `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />`,
      extra: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />`,
    };

    items.innerHTML = state.records.map(r => `
      <div class="attendance-item">
        <div class="attendance-item-icon ${r.type}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            ${iconPath[r.type] || iconPath.in}
          </svg>
        </div>
        <div class="attendance-item-content">
          <p class="attendance-item-label">${typeLabel(r.type)}打卡</p>
          <p class="attendance-item-time">${r.time}</p>
        </div>
      </div>
    `).join("");
  }

  // ==================== 啟動 ====================
  async function boot() {
    showLoading("正在連接 LINE…");
    setInterval(updateClock, 1000);
    updateClock();

    // 1. 檢查 URL token
    const t = getTokenFromUrl();
    if (!t) {
      showError(
        "尚未取得打卡 QR",
        "此頁需要從打卡站（iPad）以 LINE 掃描 QR Code 進入。",
        ["回到打卡站 QR 畫面", "以 LINE 掃描螢幕上的 QR", "即可自動開啟此頁"]
      );
      return;
    }
    state.token = t;

    // 2. LIFF
    try {
      $("loadingText").textContent = "正在驗證 LINE 身份…";
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }
      const profile = await liff.getProfile();
      state.lineUid = profile.userId;
      if (profile.pictureUrl) {
        $("userAvatar").innerHTML = `<img src="${profile.pictureUrl}" alt="">`;
      }
    } catch (e) {
      console.error("[LIFF] fail:", e);
      showError(
        "LINE 連線異常",
        "請在 LINE App 內重新掃描打卡 QR。",
        ["以 LINE App 掃描 QR", "確認 LINE 為最新版", "網路連線正常"]
      );
      return;
    }

    // 3. getPunchContext
    try {
      $("loadingText").textContent = "正在比對身份…";
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "getPunchContext", token: state.token, lineUid: state.lineUid }),
      });
      const data = await res.json().catch(() => null);
      if (!data) throw new Error("伺服器無回應 (HTTP " + res.status + ")");

      if (!data.success) {
        switch (data.code) {
          case "INVALID_TOKEN":
            showError("QR Code 已過期", data.error || "今日 QR Code 已更換，請回到 iPad 重新掃描。",
              ["回到 iPad 打卡站", "重新掃描最新的 QR", "每日 00:00 自動換新"]);
            return;
          case "NOT_AUTHORIZED":
            showError("身份未綁定",
              data.error || "您的 LINE 帳號尚未登記為員工或教練，請聯絡行政人員。",
              ["請管理員於後台設定您的 LINE UID", "LINE UID：" + (state.lineUid || "").slice(0, 12) + "…"]);
            return;
          case "NO_LINE_UID":
            showError("LINE 登入異常", data.error || "請重新掃描 QR。", []);
            return;
          default:
            showError("系統錯誤", data.error || "未知錯誤，請稍候再試。", []);
            return;
        }
      }

      // 綁定狀態
      state.actor      = data.actor || null;
      state.suggested  = data.suggestedPunchType || "in";
      state.countToday = typeof data.countToday === "number" ? data.countToday : 0;
      state.today      = data.today || "";
      state.timeHHMM   = data.timeHHMM || "";

      // 右上 header
      $("roleBadge").textContent = roleText(state.actor ? state.actor.role : "staff");
      // 使用者區
      $("userName").textContent  = state.actor ? state.actor.name : (await liff.getProfile()).displayName;
      $("userId").textContent    = state.lineUid ? state.lineUid.slice(0, 10) + "…" : "—";
      // 狀態卡
      $("statusText").textContent   = "已驗證  可以打卡";
      $("statusDetail").textContent = `今日已打卡 ${state.countToday} 次  建議：${typeLabel(state.suggested)}`;

      markSuggested(state.suggested);
      setButtonsEnabled(true);

      showApp();
    } catch (e) {
      console.error("[getPunchContext] fail:", e);
      showError("連線失敗", e && e.message ? e.message : "無法連線到打卡伺服器。", []);
    }
  }

  // ==================== 送出 ====================
  async function doPunch(type) {
    if (state.submitting) return;
    state.submitting = true;

    const btn = $("btn-" + type);
    btn.classList.add("loading");
    setButtonsEnabled(false);

    const autoDetected = (type === state.suggested);
    const note = ($("noteInput").value || "").trim();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action:       "submitPunch",
          token:        state.token,
          lineUid:      state.lineUid,
          punchType:    type,
          autoDetected: autoDetected,
          note:         note,
        }),
      });
      const data = await res.json().catch(() => null);

      if (!data || !data.success) {
        const code = data && data.code;
        const msg  = (data && data.error) || `伺服器錯誤 (HTTP ${res.status})`;
        if (code === "INVALID_TOKEN") {
          toast("error", "QR 已過期，請重新掃描");
          setTimeout(() => showError("QR Code 已過期", msg, ["回到 iPad 重新掃描 QR"]), 1200);
        } else if (code === "NOT_AUTHORIZED") {
          toast("error", "身份未綁定");
        } else {
          toast("error", msg);
        }
        return;
      }

      // 成功：加到本地紀錄
      const r = data.record || {};
      state.records.push({
        type: r.punchType || type,
        time: r.timeHHMM ? r.timeHHMM + ":00" : taipeiHHMMSS(),
      });
      state.countToday += 1;
      renderRecords();

      $("statusDetail").textContent = `今日已打卡 ${state.countToday} 次`;

      // 清備註
      $("noteInput").value = "";

      toast("success", `${typeLabel(type)}打卡成功  ${r.timeHHMM || ""}`);

      // 打完「下班」後 2.5s 自動關閉 LIFF
      if (type === "out") {
        setTimeout(() => {
          try { if (liff && liff.closeWindow) liff.closeWindow(); } catch (_) {}
        }, 2500);
      }
    } catch (e) {
      console.error("[submitPunch] fail:", e);
      toast("error", "連線失敗，請檢查網路");
    } finally {
      btn.classList.remove("loading");
      setButtonsEnabled(true);
      state.submitting = false;
    }
  }

  // 綁定 click
  document.addEventListener("DOMContentLoaded", () => {
    ["in", "out", "extra"].forEach(t => {
      $("btn-" + t).addEventListener("click", () => doPunch(t));
    });
    boot();
  });
</script>

</body>
</html>
