<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#e8f5ee">
<title>衡點健康  出勤打卡</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:          #5a9a7a;
    --primary-light:    #8ec5a7;
    --primary-bg:       #e8f5ee;
    --clock-in:         #8ec5a7;
    --clock-in-hover:   #7ab896;
    --clock-out:        #e8b4a8;
    --clock-out-hover:  #dba396;
    --extra:            #d4b896;
    --extra-hover:      #c7a886;
    --overtime-in:       #c4a980;
    --overtime-in-hover: #b59a72;
    --overtime-out:      #a88b63;
    --overtime-out-hover: #97794f;
    --background:       linear-gradient(180deg, #e8f5ee 0%, #d4ebe0 100%);
    --card:             #ffffff;
    --text:             #2d3748;
    --text-muted:       #718096;
    --text-light:       #a0aec0;
    --border:           #e2e8f0;
    --shadow:           0 2px 8px rgba(0, 0, 0, 0.06);
    --shadow-lg:        0 4px 16px rgba(0, 0, 0, 0.08);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--background);
    min-height: 100vh;
    color: var(--text);
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior-y: none;
  }

  /* ========== Loading ========== */
  .loading-screen {
    position: fixed; inset: 0;
    background: var(--background);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
  }
  .loading-icon {
    width: 72px; height: 72px;
    background: white;
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow-lg);
    animation: pulse 2s infinite;
    padding: 10px;
  }
  .loading-icon img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .loading-text {
    margin-top: 16px;
    color: var(--text-muted);
    font-size: 14px;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50%      { transform: scale(1.05); opacity: 0.8; }
  }

  /* ========== Error ========== */
  .error-screen {
    position: fixed; inset: 0;
    background: var(--background);
    display: none; align-items: center; justify-content: center;
    padding: 16px; z-index: 1000;
  }
  .error-screen.show { display: flex; }
  .error-card {
    background: white;
    border-radius: 20px;
    padding: 32px;
    max-width: 360px; width: 100%;
    text-align: center;
    box-shadow: var(--shadow-lg);
  }
  .error-icon {
    width: 64px; height: 64px;
    background: #fef2f2;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 16px;
  }
  .error-icon svg { width: 32px; height: 32px; color: #ef4444; }
  .error-title {
    font-size: 20px; font-weight: 700;
    margin-bottom: 8px;
  }
  .error-message {
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.7;
  }
  .error-tips {
    background: #f8fafc;
    border-radius: 12px;
    padding: 12px;
    text-align: left;
  }
  .error-tips-title {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: 8px;
  }
  .error-tips ul {
    font-size: 12px;
    color: var(--text-muted);
    padding-left: 16px;
    line-height: 1.7;
  }

  /* ========== App ========== */
  .app { display: none; min-height: 100vh; }
  .app.show { display: block; }

  /* ---- Header ---- */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
  }
  .header-content {
    max-width: 480px; margin: 0 auto;
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .header-logo {
    width: 40px; height: 40px;
    background: white;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--shadow);
    padding: 5px;
  }
  .header-logo img { width: 100%; height: 100%; object-fit: contain; display: block; }
  .header-title { font-weight: 600; font-size: 16px; color: var(--text); }
  .header-subtitle { font-size: 12px; color: var(--text-muted); }

  /* ---- Main ---- */
  .main {
    max-width: 480px; margin: 0 auto;
    padding: 32px 16px;
    display: flex; flex-direction: column; align-items: center; gap: 24px;
  }

  /* User */
  .user-section { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .user-avatar {
    width: 80px; height: 80px;
    border-radius: 50%;
    background: var(--primary);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; position: relative;
  }
  .user-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .user-avatar svg { width: 40px; height: 40px; color: white; }
  .user-avatar::after {
    content: '';
    position: absolute; bottom: 4px; right: 4px;
    width: 16px; height: 16px;
    background: #48bb78;
    border: 3px solid #e8f5ee;
    border-radius: 50%;
  }
  .user-name { font-size: 24px; font-weight: 600; color: var(--text); }
  .user-id {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 12px;
    background: rgba(0, 0, 0, 0.05);
    border-radius: 20px;
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Date */
  .date-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 20px;
    background: white;
    border-radius: 30px;
    box-shadow: var(--shadow);
    font-size: 14px;
    color: var(--text);
  }
  .date-badge svg { width: 18px; height: 18px; color: var(--text-muted); }

  /* Time */
  .time-display {
    display: flex; align-items: center; justify-content: center;
  }
  .time-digit {
    font-size: 72px; font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .time-separator {
    font-size: 72px; font-weight: 300;
    color: var(--text-light);
    line-height: 1;
    margin: 0 4px;
  }

  /* Status pill */
  .status-card {
    width: 100%;
    background: white;
    border-radius: 16px;
    padding: 16px 20px;
    box-shadow: var(--shadow);
    display: flex; align-items: center; gap: 12px;
  }
  .status-icon {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    background: #dcfce7;
    flex-shrink: 0;
  }
  .status-icon svg { width: 20px; height: 20px; color: #22c55e; }
  .status-icon.warn { background: #fef3c7; }
  .status-icon.warn svg { color: #f59e0b; }
  .status-text { font-size: 14px; font-weight: 500; color: var(--text); }
  .status-detail { font-size: 12px; color: var(--text-muted); }

  /* Pending banner (未綁定暫存打卡提示) */
  .pending-banner {
    width: 100%;
    background: #fffbeb;
    border: 1px solid #fde68a;
    border-left: 4px solid #f59e0b;
    border-radius: 12px;
    padding: 12px 14px;
    display: none;
    align-items: flex-start;
    gap: 10px;
    font-size: 13px;
    color: #78350f;
    line-height: 1.55;
  }
  .pending-banner.show { display: flex; }
  .pending-banner .pb-icon {
    width: 20px; height: 20px;
    color: #f59e0b;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .pending-banner .pb-title {
    font-weight: 600;
    color: #92400e;
    margin-bottom: 2px;
  }

  /* Clock buttons */
  .clock-buttons {
    display: flex; justify-content: center;
    gap: 20px;
    padding: 8px 0;
    flex-wrap: wrap;
  }
  .clock-btn-wrapper {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    position: relative;
  }
  .clock-btn {
    width: 100px; height: 100px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.3s;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  .clock-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }
  .clock-btn:not(:disabled):hover { transform: scale(1.05); }
  .clock-btn:not(:disabled):active { transform: scale(0.95); }
  .clock-btn.clock-in    { background: var(--clock-in); }
  .clock-btn.clock-in:not(:disabled):hover    { background: var(--clock-in-hover); }
  .clock-btn.clock-out   { background: var(--clock-out); }
  .clock-btn.clock-out:not(:disabled):hover   { background: var(--clock-out-hover); }
  .clock-btn.clock-extra { background: var(--extra); }
  .clock-btn.clock-extra:not(:disabled):hover { background: var(--extra-hover); }
  .clock-btn.clock-overtime-in { background: var(--overtime-in); }
  .clock-btn.clock-overtime-in:not(:disabled):hover { background: var(--overtime-in-hover); }
  .clock-btn.clock-overtime-out { background: var(--overtime-out); }
  .clock-btn.clock-overtime-out:not(:disabled):hover { background: var(--overtime-out-hover); }
  .clock-btn svg { width: 36px; height: 36px; color: white; }
  .clock-btn-label { font-size: 14px; font-weight: 500; color: var(--text); }
  .clock-btn-label.clock-in    { color: var(--primary); }
  .clock-btn-label.clock-out   { color: #c97a6d; }
  .clock-btn-label.clock-extra { color: #a68558; }
  .clock-btn-label.clock-overtime-in  { color: #8b6f3e; }
  .clock-btn-label.clock-overtime-out { color: #6e5530; }

  /* Suggestion ring */
  .clock-btn-wrapper.suggested .clock-btn::before {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--primary);
    opacity: 0.55;
    animation: ringPulse 1.8s ease-in-out infinite;
    pointer-events: none;
  }
  @keyframes ringPulse {
    0%, 100% { transform: scale(1);    opacity: 0.55; }
    50%      { transform: scale(1.12); opacity: 0; }
  }
  .suggest-badge {
    position: absolute;
    top: -8px; right: -4px;
    background: var(--primary);
    color: white;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 3px 8px;
    border-radius: 10px;
    box-shadow: var(--shadow);
    pointer-events: none;
    display: none;
  }
  .clock-btn-wrapper.suggested .suggest-badge { display: inline-block; }

  /* Button spinner */
  .clock-btn .btn-spinner {
    width: 36px; height: 36px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    display: none;
  }
  .clock-btn.loading svg { display: none; }
  .clock-btn.loading .btn-spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Note */
  .note-field { width: 100%; }
  .note-label {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 6px; padding-left: 4px;
  }
  .note-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    resize: none;
    min-height: 44px;
    transition: border-color 0.2s;
  }
  .note-input:focus { outline: none; border-color: var(--primary); }

  /* Attendance card */
  .attendance-card {
    width: 100%;
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: var(--shadow);
  }
  .attendance-title {
    font-size: 16px; font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 8px;
  }
  .attendance-title svg { width: 20px; height: 20px; color: var(--text-muted); }
  .attendance-count {
    margin-left: auto;
    font-size: 12px; color: var(--text-muted);
    background: #f1f5f9;
    padding: 4px 10px;
    border-radius: 20px;
  }
  .attendance-items { display: flex; flex-direction: column; gap: 12px; }
  .attendance-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px;
    background: #f8fafc;
    border-radius: 12px;
  }
  .attendance-item-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .attendance-item-icon.in    { background: rgba(142, 197, 167, 0.2); }
  .attendance-item-icon.out   { background: rgba(232, 180, 168, 0.2); }
  .attendance-item-icon.extra { background: rgba(212, 184, 150, 0.2); }
  .attendance-item-icon.overtime_in  { background: rgba(196, 169, 128, 0.22); }
  .attendance-item-icon.overtime_out { background: rgba(168, 139, 99, 0.22); }
  .attendance-item-icon svg { width: 18px; height: 18px; }
  .attendance-item-icon.in    svg { color: var(--primary); }
  .attendance-item-icon.out   svg { color: #c97a6d; }
  .attendance-item-icon.extra svg { color: #a68558; }
  .attendance-item-icon.overtime_in  svg { color: #8b6f3e; }
  .attendance-item-icon.overtime_out svg { color: #6e5530; }
  .attendance-item-content { flex: 1; }
  .attendance-item-label { font-size: 12px; color: var(--text-muted); }
  .attendance-item-time {
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--text);
  }
  .attendance-empty {
    text-align: center; color: var(--text-light);
    font-size: 13px; padding: 18px;
  }

  /* Footer */
  .footer {
    text-align: center;
    padding: 24px;
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 0.08em;
  }

  /* Toast */
  .toast-container {
    position: fixed;
    top: 20px; left: 50%;
    transform: translateX(-50%);
    z-index: 1000;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
    padding: 0 16px;
    max-width: 100%;
  }
  .toast {
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 14px; font-weight: 500;
    box-shadow: var(--shadow-lg);
    animation: toastIn 0.3s ease;
    color: white;
    pointer-events: auto;
    max-width: 420px;
    text-align: center;
  }
  .toast.success { background: #22c55e; }
  .toast.error   { background: #ef4444; }
  .toast.warning { background: #f59e0b; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(-20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Fade stagger */
  .fade-in { animation: fadeIn 0.5s ease both; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .delay-1 { animation-delay: 0.08s; }
  .delay-2 { animation-delay: 0.16s; }
  .delay-3 { animation-delay: 0.24s; }
  .delay-4 { animation-delay: 0.32s; }
  .delay-5 { animation-delay: 0.40s; }

  @media (max-width: 360px) {
    .time-digit, .time-separator { font-size: 60px; }
    .clock-btn { width: 88px; height: 88px; }
    .clock-btn svg, .clock-btn .btn-spinner { width: 32px; height: 32px; }
  }

  /* ========== Correction Request (補打卡申請) ========== */
  .corr-request-section {
    width: 100%;
    text-align: center;
    margin-top: -8px;
  }
  .corr-request-btn {
    background: none;
    border: 1px dashed var(--border);
    color: var(--text-muted);
    padding: 10px 18px;
    border-radius: 10px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .corr-request-btn:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: rgba(90, 154, 122, 0.05);
  }
  .cmodal-overlay {
    position: fixed; inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 2000;
    padding: 16px;
  }
  .cmodal-overlay.show { display: flex; }
  .cmodal-box {
    background: white;
    border-radius: 16px;
    width: 100%;
    max-width: 420px;
    padding: 22px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
  }
  .cmodal-title {
    font-size: 18px; font-weight: 600;
    color: var(--text); margin-bottom: 4px;
  }
  .cmodal-sub {
    font-size: 12px; color: var(--text-muted);
    margin-bottom: 16px;
  }
  .cmodal-field { margin-bottom: 14px; }
  .cmodal-field label {
    display: block;
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .cmodal-field input,
  .cmodal-field select,
  .cmodal-field textarea {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
  }
  .cmodal-field input:focus,
  .cmodal-field select:focus,
  .cmodal-field textarea:focus {
    outline: none;
    border-color: var(--primary);
  }
  .cmodal-field textarea { min-height: 72px; resize: vertical; }
  .cmodal-hint {
    font-size: 11px;
    color: var(--text-light);
    margin-top: 4px;
  }
  .cmodal-actions {
    display: flex; gap: 10px;
    margin-top: 18px;
  }
  .cmodal-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .cmodal-btn.secondary { background: #f1f5f9; color: var(--text); }
  .cmodal-btn.primary   { background: var(--primary); color: #fff; }
  .cmodal-btn:disabled  { opacity: 0.5; cursor: not-allowed; }
</style>
</head>
<body>

<!-- Loading -->
<div id="loadingScreen" class="loading-screen">
  <div class="loading-icon">
    <img src="https://ik.imagekit.io/hanhealth/assets/logo.png?updatedAt=1772155101138" alt="衡點健康">
  </div>
  <p class="loading-text" id="loadingText">正在連接 LINE…</p>
</div>

<!-- Error -->
<div id="errorScreen" class="error-screen">
  <div class="error-card">
    <div class="error-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
      </svg>
    </div>
    <h2 class="error-title" id="errorTitle">連接失敗</h2>
    <p class="error-message" id="errorMessage">無法連接</p>
    <div class="error-tips">
      <p class="error-tips-title">請確認：</p>
      <ul id="errorTips">
        <li>此頁面從打卡站 QR 掃入</li>
        <li>已在 LINE 內開啟</li>
        <li>網路連線正常</li>
      </ul>
    </div>
  </div>
</div>

<!-- App -->
<div id="app" class="app">

  <!-- Header -->
  <header class="header">
    <div class="header-content">
      <div class="header-left">
        <div class="header-logo">
          <img src="https://ik.imagekit.io/hanhealth/assets/logo.png?updatedAt=1772155101138" alt="衡點健康">
        </div>
        <div>
          <h1 class="header-title">衡點 出勤</h1>
          <p class="header-subtitle" id="roleBadge">—</p>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- User -->
    <section class="user-section fade-in">
      <div class="user-avatar" id="userAvatar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
        </svg>
      </div>
      <h2 class="user-name" id="userName">—</h2>
      <div class="user-id">
        <span>LINE:</span>
        <span id="userId">—</span>
      </div>
    </section>

    <!-- Date -->
    <section class="fade-in delay-1">
      <div class="date-badge">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script>
  // ==================== 設定 ====================
  const LIFF_ID      = "2007947083-EsrS7ZrM";
  const SUPABASE_URL = "https://mnjilhpztnowaplggvkk.supabase.co";
  // 2026-05-14 Wave5/Step8 cutover Edge → Zeabur (rollback：改回 SUPABASE_URL + "/functions/v1/attendance-api")
  const API_URL      = "https://attendance-hendia.zeabur.app/";
  // 2026-05-17 P3：補打卡申請 — 走 admin-service
  const ADMIN_API_URL = "https://admin-hendia.zeabur.app/";
  const ADMIN_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im1uamlsaHB6dG5vd2FwbGdndmtrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU3MDA0ODYsImV4cCI6MjA4MTI3NjQ4Nn0.X3e9DF3iT2KUR9ma3_Ins01vG607R155v0xia8hO_Qg";
  const CORRECTION_WINDOW_DAYS = 60;

  // ==================== 全域狀態 ====================
  const state = {
    token:       null,
    lineUid:     null,
    displayName: "",     // LIFF profile.displayName（pending 時送 API 辨識用）
    actor:       null,   // { id, name, role }
    suggested:   null,
    countToday:  0,
    today:       "",
    timeHHMM:    "",
    submitting:  false,
    records:     [],     // 本次 session 成功打出的紀錄（optimistic）
    pending:     false,  // true = 未綁定 staff，打卡以 pending 狀態存入
    pendingInfo: null,   // { dailyLimit, remaining, retentionDays, message }
  };

  const $ = (id) => document.getElementById(id);

  // ==================== 狀態切換 ====================
  function showLoading(text) {
    $("errorScreen").classList.remove("show");
    $("app").classList.remove("show");
    $("loadingScreen").style.display = "flex";
    if (text) $("loadingText").textContent = text;
  }
  function showApp() {
    $("loadingScreen").style.display = "none";
    $("errorScreen").classList.remove("show");
    $("app").classList.add("show");
  }
  function showError(title, message, tips) {
    $("loadingScreen").style.display = "none";
    $("app").classList.remove("show");
    $("errorTitle").textContent   = title || "發生錯誤";
    $("errorMessage").textContent = message || "";
    if (Array.isArray(tips) && tips.length) {
      $("errorTips").innerHTML = tips.map(t => `<li>${t}</li>`).join("");
    }
    $("errorScreen").classList.add("show");
  }

  // ==================== Toast ====================
  function toast(type, msg, ms) {
    const container = $("toastContainer");
    const el = document.createElement("div");
    el.className = "toast " + (type || "success");
    el.textContent = msg;
    container.appendChild(el);
    setTimeout(() => {
      el.style.transition = "opacity 0.3s ease";
      el.style.opacity = "0";
      setTimeout(() => el.remove(), 320);
    }, ms || 2600);
  }

  // ==================== Pending Banner ====================
  function showPendingBanner(msg) {
    const el = $("pendingBanner");
    if (!el) return;
    if (msg) $("pendingBannerMsg").textContent = msg;
    el.classList.add("show");
  }
  function hidePendingBanner() {
    const el = $("pendingBanner");
    if (el) el.classList.remove("show");
  }

  // ==================== 時鐘 ====================
  function pad2(n) { return String(n).padStart(2, "0"); }

  function taipeiNow() {
    const parts = new Intl.DateTimeFormat("en-CA", {
      timeZone: "Asia/Taipei",
      year: "numeric", month: "2-digit", day: "2-digit",
      hour: "2-digit", minute: "2-digit", second: "2-digit",
      hour12: false, weekday: "short",
    }).formatToParts(new Date());
    const o = {};
    parts.forEach(p => o[p.type] = p.value);
    return o;
  }
  function updateClock() {
    const p = taipeiNow();
    $("timeHour").textContent   = p.hour;
    $("timeMinute").textContent = p.minute;
    $("timeSecond").textContent = p.second;
    const wkMap = { Mon:"一", Tue:"二", Wed:"三", Thu:"四", Fri:"五", Sat:"六", Sun:"日" };
    $("dateDisplay").textContent =
      `${p.year}年${parseInt(p.month,10)}月${parseInt(p.day,10)}日 星期${wkMap[p.weekday] || p.weekday}`;
  }
  function taipeiHHMMSS() {
    const p = taipeiNow();
    return `${p.hour}:${p.minute}:${p.second}`;
  }

  // ==================== URL token ====================
  function getTokenFromUrl() {
    try {
      const params = new URLSearchParams(window.location.search);
      let t = params.get("t") || params.get("token");
      if (t) return t;
      const liffState = params.get("liff.state");
      if (liffState) {
        const inner = new URLSearchParams(liffState.startsWith("?") ? liffState.slice(1) : liffState);
        t = inner.get("t") || inner.get("token");
        if (t) return t;
      }
    } catch (_) {}
    return null;
  }

  // ==================== 顯示工具 ====================
  function roleText(role) {
    return role === "coach" ? "教練 Coach" : "員工 Staff";
  }
  // 所有 UI 上的打卡型別（不含 legacy 'extra'，extra 只在顯示舊紀錄時用）
  const UI_TYPES = ["in", "out", "overtime_in", "overtime_out"];

  function typeLabel(type) {
    return {
      in:"上班",
      out:"下班",
      overtime_in:"加班上班",
      overtime_out:"加班下班",
      extra:"加班（舊）"
    }[type] || type;
  }

  function markSuggested(type) {
    // 若系統建議 'extra'（3rd+ punch of day），沒有對應按鈕 → 不標任何按鈕
    UI_TYPES.forEach(t => {
      const el = $("wrap-" + t);
      if (el) el.classList.toggle("suggested", t === type);
    });
  }

  function setButtonsEnabled(enabled) {
    UI_TYPES.forEach(t => {
      const el = $("btn-" + t);
      if (el) el.disabled = !enabled;
    });
  }

  function renderRecords() {
    const items = $("recordItems");
    $("countBadge").textContent = state.records.length + " 次";

    if (state.records.length === 0) {
      items.innerHTML = '<div class="attendance-empty">尚未打卡</div>';
      return;
    }

    const iconPath = {
      in:    `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />`,
      out:   `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />`,
      overtime_in:  `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1" />`,
      overtime_out: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />`,
      extra: `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />`,
    };

    items.innerHTML = state.records.map(r => `
      <div class="attendance-item">
        <div class="attendance-item-icon ${r.type}">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            ${iconPath[r.type] || iconPath.in}
          </svg>
        </div>
        <div class="attendance-item-content">
          <p class="attendance-item-label">${typeLabel(r.type)}打卡${r.pending ? ' <span style="font-size:11px;color:#92400e;background:#fffbeb;border:1px solid #fde68a;padding:1px 6px;border-radius:6px;margin-left:6px;">暫存</span>' : ''}</p>
          <p class="attendance-item-time">${r.time}</p>
        </div>
      </div>
    `).join("");
  }

  // ==================== 啟動 ====================
  async function boot() {
    showLoading("正在連接 LINE…");
    setInterval(updateClock, 1000);
    updateClock();

    // 1. 檢查 URL token
    const t = getTokenFromUrl();
    if (!t) {
      showError(
        "尚未取得打卡 QR",
        "此頁需要從打卡站（iPad）以 LINE 掃描 QR Code 進入。",
        ["回到打卡站 QR 畫面", "以 LINE 掃描螢幕上的 QR", "即可自動開啟此頁"]
      );
      return;
    }
    state.token = t;

    // 2. LIFF
    try {
      $("loadingText").textContent = "正在驗證 LINE 身份…";
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) {
        liff.login({ redirectUri: window.location.href });
        return;
      }
      const profile = await liff.getProfile();
      state.lineUid     = profile.userId;
      state.displayName = profile.displayName || "";
      if (profile.pictureUrl) {
        $("userAvatar").innerHTML = `<img src="${profile.pictureUrl}" alt="">`;
      }
    } catch (e) {
      console.error("[LIFF] fail:", e);
      showError(
        "LINE 連線異常",
        "請在 LINE App 內重新掃描打卡 QR。",
        ["以 LINE App 掃描 QR", "確認 LINE 為最新版", "網路連線正常"]
      );
      return;
    }

    // 3. getPunchContext
    try {
      $("loadingText").textContent = "正在比對身份…";
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action:      "getPunchContext",
          token:       state.token,
          lineUid:     state.lineUid,
          displayName: state.displayName,
        }),
      });
      const data = await res.json().catch(() => null);
      if (!data) throw new Error("伺服器無回應 (HTTP " + res.status + ")");

      if (!data.success) {
        switch (data.code) {
          case "INVALID_TOKEN":
            showError("QR Code 已過期", data.error || "今日 QR Code 已更換，請回到 iPad 重新掃描。",
              ["回到 iPad 打卡站", "重新掃描最新的 QR", "每日 00:00 自動換新"]);
            return;
          case "NOT_AUTHORIZED":
            showError("身份未綁定",
              data.error || "您的 LINE 帳號尚未登記為員工或教練，請聯絡行政人員。",
              ["請管理員於後台設定您的 LINE UID", "LINE UID：" + (state.lineUid || "").slice(0, 12) + "…"]);
            return;
          case "NO_LINE_UID":
            showError("LINE 登入異常", data.error || "請重新掃描 QR。", []);
            return;
          default:
            showError("系統錯誤", data.error || "未知錯誤，請稍候再試。", []);
            return;
        }
      }

      // 綁定狀態
      state.actor       = data.actor || null;
      state.suggested   = data.suggestedPunchType || "in";
      state.countToday  = typeof data.countToday === "number" ? data.countToday : 0;
      state.today       = data.today || "";
      state.timeHHMM    = data.timeHHMM || "";
      state.pending     = !!data.pending;
      state.pendingInfo = data.pendingInfo || null;

      // 右上 header
      $("roleBadge").textContent = state.pending
        ? "待綁定"
        : roleText(state.actor ? state.actor.role : "staff");
      // 使用者區
      $("userName").textContent  = state.actor && state.actor.name
        ? state.actor.name
        : (state.displayName || "（LINE 使用者）");
      $("userId").textContent    = state.lineUid ? state.lineUid.slice(0, 10) + "…" : "—";

      // 狀態卡 + pending 橫幅
      // 若建議為 'extra'（正規上下班都打過了），不顯示建議，請使用者手動選加班
      const suggestText = UI_TYPES.includes(state.suggested)
        ? `建議：${typeLabel(state.suggested)}`
        : "正規上下班已打完，加班請手動選擇";
      if (state.pending) {
        $("statusText").textContent   = "尚未建檔  暫存打卡";
        const pInfo = state.pendingInfo || {};
        const remain = typeof pInfo.remaining === "number" ? pInfo.remaining : 5;
        $("statusDetail").textContent =
          `今日暫存 ${state.countToday}/${pInfo.dailyLimit || 5} 次  ${suggestText}`;
        showPendingBanner(pInfo.message ||
          `您尚未建檔，本次打卡將暫存為待綁定（今日剩 ${remain} 次）。行政人員建檔後會自動歸戶，14 天未歸戶會自動清除。`);
      } else {
        $("statusText").textContent   = "已驗證  可以打卡";
        $("statusDetail").textContent = `今日已打卡 ${state.countToday} 次  ${suggestText}`;
        hidePendingBanner();
      }

      markSuggested(state.suggested);
      setButtonsEnabled(true);

      // 已綁定 staff 才開放「申請補打卡」入口（pending 狀態不顯示）
      const corrSection = $("corrRequestSection");
      if (corrSection) {
        const canRequest = !!(state.actor && state.actor.id && !state.pending);
        corrSection.style.display = canRequest ? "block" : "none";
      }

      showApp();
    } catch (e) {
      console.error("[getPunchContext] fail:", e);
      showError("連線失敗", e && e.message ? e.message : "無法連線到打卡伺服器。", []);
    }
  }

  // ==================== 送出 ====================
  async function doPunch(type) {
    if (state.submitting) return;
    state.submitting = true;

    const btn = $("btn-" + type);
    btn.classList.add("loading");
    setButtonsEnabled(false);

    const autoDetected = (type === state.suggested);
    const note = ($("noteInput").value || "").trim();

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          action:       "submitPunch",
          token:        state.token,
          lineUid:      state.lineUid,
          displayName:  state.displayName,
          punchType:    type,
          autoDetected: autoDetected,
          note:         note,
        }),
      });
      const data = await res.json().catch(() => null);

      if (!data || !data.success) {
        const code = data && data.code;
        const msg  = (data && data.error) || `伺服器錯誤 (HTTP ${res.status})`;
        if (code === "INVALID_TOKEN") {
          toast("error", "QR 已過期，請重新掃描");
          setTimeout(() => showError("QR Code 已過期", msg, ["回到 iPad 重新掃描 QR"]), 1200);
        } else if (code === "PENDING_LIMIT_EXCEEDED") {
          toast("warning", msg);
          setButtonsEnabled(false);
        } else if (code === "NOT_AUTHORIZED") {
          toast("error", "身份未綁定");
        } else {
          toast("error", msg);
        }
        return;
      }

      // 成功：加到本地紀錄
      const r      = data.record || {};
      const isPend = !!data.pending;
      state.records.push({
        type:    r.punchType || type,
        time:    r.timeHHMM ? r.timeHHMM + ":00" : taipeiHHMMSS(),
        pending: isPend,
      });
      state.countToday += 1;
      renderRecords();

      if (isPend) {
        const pInfo = state.pendingInfo || {};
        const limit = pInfo.dailyLimit || 5;
        const remain = Math.max(0, limit - state.countToday);
        $("statusDetail").textContent =
          `今日暫存 ${state.countToday}/${limit} 次（剩 ${remain}）`;
      } else {
        $("statusDetail").textContent = `今日已打卡 ${state.countToday} 次`;
      }

      // 清備註
      $("noteInput").value = "";

      if (isPend) {
        toast("success",
          data.pendingMessage ||
          `${typeLabel(type)}打卡已暫存  ${r.timeHHMM || ""}`
        );
      } else {
        toast("success", `${typeLabel(type)}打卡成功  ${r.timeHHMM || ""}`);
      }

      // 打完「下班 / 加班下班」後 2.5s 自動關閉 LIFF
      if (type === "out" || type === "overtime_out") {
        setTimeout(() => {
          try { if (liff && liff.closeWindow) liff.closeWindow(); } catch (_) {}
        }, 2500);
      }
    } catch (e) {
      console.error("[submitPunch] fail:", e);
      toast("error", "連線失敗，請檢查網路");
    } finally {
      btn.classList.remove("loading");
      setButtonsEnabled(true);
      state.submitting = false;
    }
  }

  // ==================== 申請補打卡（admin-service / requestPunchCorrection） ====================
  function corrTodayTw() {
    const p = taipeiNow();
    return `${p.year}-${p.month}-${p.day}`;
  }
  function corrMinDateTw() {
    // today - CORRECTION_WINDOW_DAYS days，以台北日期為基準
    const p = taipeiNow();
    const base = new Date(Date.UTC(+p.year, +p.month - 1, +p.day, 12, 0, 0));
    base.setUTCDate(base.getUTCDate() - CORRECTION_WINDOW_DAYS);
    const y  = base.getUTCFullYear();
    const m  = String(base.getUTCMonth() + 1).padStart(2, "0");
    const d  = String(base.getUTCDate()).padStart(2, "0");
    return `${y}-${m}-${d}`;
  }

  function openReqCorrectionModal() {
    if (!state.actor || !state.actor.id) {
      toast("error", "請先完成身份驗證");
      return;
    }
    const today = corrTodayTw();
    const minD  = corrMinDateTw();
    $("reqCorrSub").textContent =
      `申請人：${(state.actor && state.actor.name) || state.displayName || "—"}（${state.actor.id}）`;
    $("reqCorrType").value = "in";
    const dateEl = $("reqCorrDate");
    dateEl.min = minD;
    dateEl.max = today;
    dateEl.value = today;
    $("reqCorrTime").value = "";
    $("reqCorrReason").value = "";
    $("reqCorrDateHint").textContent = `可補日期：${minD} ~ ${today}（最多 ${CORRECTION_WINDOW_DAYS} 天，不能補未來）`;
    $("reqCorrectionModal").classList.add("show");
    setTimeout(() => { try { $("reqCorrTime").focus(); } catch (_) {} }, 60);
  }
  function closeReqCorrectionModal() {
    $("reqCorrectionModal").classList.remove("show");
  }

  async function callAdminAction(payload) {
    let idToken = null;
    try {
      if (typeof liff !== "undefined" && liff.isLoggedIn && liff.isLoggedIn()) {
        idToken = liff.getIDToken();
      }
    } catch (_) {}
    const headers = {
      "Content-Type":  "application/json",
      "Authorization": "Bearer " + ADMIN_ANON_KEY,
      "apikey":        ADMIN_ANON_KEY,
    };
    if (idToken) headers["X-Line-IdToken"] = idToken;

    const body = Object.assign({}, payload);
    if (state.lineUid && !body.lineUid) body.lineUid = state.lineUid;

    const res = await fetch(ADMIN_API_URL, {
      method: "POST",
      headers: headers,
      body: JSON.stringify(body),
    });
    let json = null;
    try { json = await res.json(); } catch (_) { json = null; }
    return { res, json };
  }

  async function submitReqCorrection(allowDuplicate) {
    if (!state.actor || !state.actor.id) {
      toast("error", "請先完成身份驗證");
      return;
    }
    const punchType  = $("reqCorrType").value;
    const targetDate = $("reqCorrDate").value;
    const targetTime = $("reqCorrTime").value;
    const reason     = ($("reqCorrReason").value || "").trim();

    if (!targetDate) { toast("warning", "請選日期"); return; }
    if (!targetTime) { toast("warning", "請填時間"); return; }
    if (!reason)     { toast("warning", "請填原因"); return; }

    // 客戶端日期區間校驗（後端會再驗一次）
    const today = corrTodayTw();
    const minD  = corrMinDateTw();
    if (targetDate > today) { toast("warning", "不能補未來日期"); return; }
    if (targetDate < minD)  { toast("warning", `最多只能往前 ${CORRECTION_WINDOW_DAYS} 天`); return; }

    const btn = $("reqCorrSubmit");
    btn.disabled = true;
    btn.textContent = "送出中…";

    try {
      const { res, json } = await callAdminAction({
        action:          "requestPunchCorrection",
        staff_id:        state.actor.id,
        request_type:    "add",
        punch_type:      punchType,
        target_date:     targetDate,
        target_time:     targetTime,
        reason:          reason,
        allow_duplicate: !!allowDuplicate,
      });

      // 重複打卡 → 跳 confirm 後重送
      if (res.status === 409 && json && json.code === "DUPLICATE_PUNCH_EXISTS") {
        const msg = (json.error || "該員工該日該類型已有打卡紀錄。") +
                    "\n\n仍要送出嗎？（按「確定」= 仍送出 / 按「取消」= 放棄）";
        if (window.confirm(msg)) {
          btn.disabled = false;
          btn.textContent = "送出申請";
          await submitReqCorrection(true);
          return;
        } else {
          return;
        }
      }

      if (!res.ok || !json || !json.success) {
        const errMsg = (json && (json.error || json.message)) ||
                       `送出失敗 (HTTP ${res.status})`;
        toast("error", errMsg);
        return;
      }

      toast("success", "✅ 已送出申請，等候主管審核");
      closeReqCorrectionModal();
    } catch (e) {
      console.error("[requestPunchCorrection] fail:", e);
      toast("error", "連線失敗，請檢查網路");
    } finally {
      btn.disabled = false;
      btn.textContent = "送出申請";
    }
  }

  // 綁定 click
  document.addEventListener("DOMContentLoaded", () => {
    ["in", "out", "overtime_in", "overtime_out"].forEach(t => {
      const el = $("btn-" + t);
      if (el) el.addEventListener("click", () => doPunch(t));
    });

    // 申請補打卡 入口 + modal 按鈕
    const reqBtn = $("corrRequestBtn");
    if (reqBtn) reqBtn.addEventListener("click", openReqCorrectionModal);
    const reqCancel = $("reqCorrCancel");
    if (reqCancel) reqCancel.addEventListener("click", closeReqCorrectionModal);
    const reqSubmit = $("reqCorrSubmit");
    if (reqSubmit) reqSubmit.addEventListener("click", () => submitReqCorrection(false));
    const overlay = $("reqCorrectionModal");
    if (overlay) overlay.addEventListener("click", (e) => {
      if (e.target === overlay) closeReqCorrectionModal();
    });

    boot();
  });
</script>

</body>
</html>
